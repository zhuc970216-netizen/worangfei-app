<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7fb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="窝囊费" />
    <meta name="description" content="一款按秒计算今日工资收益的可爱小应用。" />
    <title>窝囊费</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card" aria-labelledby="app-title">
        <header class="top-bar">
          <button class="back-button" type="button" aria-label="返回">‹</button>
          <div class="title-stack date-row top-date-row">
            <span id="dateText">--</span>
            <strong id="timeText">--:--:--</strong>
          </div>
          <button
            id="settingsButton"
            class="settings-button"
            type="button"
            aria-controls="settingsPanel"
            aria-expanded="false"
          >
            设置
          </button>
        </header>

        <h1 id="app-title" class="visually-hidden">窝囊费</h1>

        <div class="confetti" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="mascot-stage" aria-live="polite">
          <div class="coin-bubble left-bubble">
            <strong id="leftCoin">¥0</strong>
            <span>进账</span>
          </div>
          <div id="coinStream" class="coin-stream" aria-hidden="true"></div>
          <div id="moneyBag" class="mascot money-bag">
            <div class="bag-top">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="bag-rope"></div>
            <div class="bag-body">
              <span class="bag-shine"></span>
              <span class="bag-emblem">¥</span>
            </div>
            <div class="salary-badge">
              <span>今日累计</span>
              <strong id="todayAmount">¥0.00</strong>
            </div>
          </div>
          <div class="coin-bubble right-bubble">
            <strong id="rightCoin">¥0</strong>
            <span>每秒</span>
          </div>
          <div class="mascot-shadow" aria-hidden="true"></div>
        </div>

      </section>

      <section class="work-progress-card" aria-label="今日上班进度">
        <div class="work-progress-head">
          <div>
            <p class="soft-label">今日上班进度</p>
            <strong id="offWorkCountdown">--</strong>
          </div>
          <span id="workProgressPercent">0%</span>
        </div>
        <div class="work-track">
          <span id="workProgressBar" class="work-progress-bar"></span>
        </div>
      </section>

    </main>

    <div id="settingsOverlay" class="settings-overlay" hidden>
      <div class="settings-backdrop" data-close-settings></div>
      <section
        id="settingsPanel"
        class="settings-panel"
        aria-labelledby="settings-title"
        aria-modal="true"
        role="dialog"
      >
        <div class="panel-grip" aria-hidden="true"></div>
        <div class="panel-heading">
          <div>
            <p class="eyebrow">薪资参数</p>
            <h2 id="settings-title">设置你的窝囊费</h2>
          </div>
          <button id="settingsCloseButton" class="close-button" type="button" aria-label="关闭设置">
            ×
          </button>
        </div>

        <form id="settingsForm" class="settings-form">
          <label>
            <span>月薪（元）</span>
            <input id="monthlySalary" inputmode="decimal" type="number" min="0" step="100" />
          </label>
          <label>
            <span>每月出勤天数</span>
            <input id="attendanceDays" inputmode="decimal" type="number" min="1" step="0.5" />
          </label>
          <label>
            <span>上班时间</span>
            <input id="startTime" type="time" />
          </label>
          <label>
            <span>下班时间</span>
            <input id="endTime" type="time" />
          </label>
          <label class="full-row">
            <span>当日休息时长（分钟）</span>
            <input id="breakMinutes" inputmode="numeric" type="number" min="0" step="5" />
          </label>
        </form>

        <div class="settings-actions">
          <button id="resetButton" class="ghost-button" type="button">恢复示例</button>
          <p class="small-note">数据只保存在本机。休息时段会自动放在工作日中间，并暂停进账。</p>
        </div>
      </section>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
